services:
  spark:
    image: apache/spark:4.1.1-python3
    hostname: spark
    command:
      - bash
      - -c
      - |
        /opt/spark/sbin/start-connect-server.sh \
          --master 'local[*]' \
          --driver-memory 6g \
          --conf spark.driver.extraJavaOptions='-Divy.cache.dir=/tmp -Divy.home=/tmp'
        tail -f /opt/spark/logs/*.out
    ports:
      - "15002:15002"   # Spark Connect gRPC
      - "4040:4040"     # Spark UI
    volumes:
      - ./data:/opt/spark/work/data
    networks:
      - spark-net

  jupyter:
    build:
      context: .
      dockerfile: jupyter.Dockerfile
    hostname: jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data
    environment:
      - SPARK_REMOTE=sc://spark:15002
    command: start-notebook.py --NotebookApp.token='' --NotebookApp.password=''
    depends_on:
      - spark
    networks:
      - spark-net

networks:
  spark-net:
    driver: bridge
